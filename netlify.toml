[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  VITE_API_BASE = "/api/v1"

# Keep CMS authentication same-origin and let Netlify relay API traffic.
[[redirects]]
  from = "/api/v1/*"
  to = "https://web-production-0f6b5.up.railway.app/api/v1/:splat"
  status = 200
  force = true

# Single-page app — serve index.html for all routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Ensure fresh HTML after each deploy while keeping hashed assets cacheable.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
