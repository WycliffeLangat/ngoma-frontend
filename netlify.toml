[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Node 18+ is required for native fetch in scripts/generate-chart-data.mjs.
  NODE_VERSION = "18"
  # VITE_API_BASE_URL must be set in Netlify → Site settings → Environment variables.
  # Example: https://your-app.railway.app/api/v1
  # The prebuild script uses this to refresh chartData.js from the live API on every deploy.

# Single-page app — serve index.html for all routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Ensure fresh HTML after each deploy while keeping hashed assets cacheable.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
