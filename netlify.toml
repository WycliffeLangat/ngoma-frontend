[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  # VITE_API_BASE must be set in Netlify Site settings -> Environment variables.
  # Example: https://api.ngomacharts.co.ke/api/v1

# Single-page app — serve index.html for all routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Ensure fresh HTML after each deploy while keeping hashed assets cacheable.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
